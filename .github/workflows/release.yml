name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build and upload to'
        required: true
        default: 'v1.0.0'

permissions:
  contents: write

jobs:
  # ───────────────────────── Test ─────────────────────────
  # 先运行全量测试（含 -race 竞态检测），构建作业通过 needs 依赖本作业，
  # 测试失败则阻止构建产物发布。
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      - name: Install Fyne dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgl1-mesa-dev libegl1-mesa-dev libgles2-mesa-dev \
            libx11-dev libxrandr-dev libxcursor-dev libxinerama-dev \
            libxi-dev libxxf86vm-dev libasound2-dev \
            libwayland-dev libxkbcommon-dev wayland-protocols \
            pkg-config

      - name: Test with race detector
        run: go test -race -count=1 ./...

  # ───────────────────────── Linux ─────────────────────────
  build-linux:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      - name: Install Fyne dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgl1-mesa-dev libegl1-mesa-dev libgles2-mesa-dev \
            libx11-dev libxrandr-dev libxcursor-dev libxinerama-dev \
            libxi-dev libxxf86vm-dev libasound2-dev \
            libwayland-dev libxkbcommon-dev wayland-protocols \
            pkg-config

      - name: Build
        env:
          CGO_ENABLED: 1
          GOOS: linux
          GOARCH: amd64
        run: |
          go build -trimpath -ldflags="-s -w" -o goshell ./cmd/meatshell

      - name: Package
        run: |
          VERSION="${{ inputs.tag }}"
          VERSION="${VERSION:-${GITHUB_REF_NAME}}"
          mkdir -p dist/goshell-${VERSION}-linux-amd64
          cp goshell dist/goshell-${VERSION}-linux-amd64/
          cp packaging/linux/goshell.desktop dist/goshell-${VERSION}-linux-amd64/ 2>/dev/null || true
          cp packaging/linux/install.sh dist/goshell-${VERSION}-linux-amd64/ 2>/dev/null || true
          cp assets/icon.png dist/goshell-${VERSION}-linux-amd64/ 2>/dev/null || true
          cp -r lang dist/goshell-${VERSION}-linux-amd64/ 2>/dev/null || true
          chmod +x dist/goshell-${VERSION}-linux-amd64/install.sh 2>/dev/null || true
          cd dist
          tar -czf goshell-${VERSION}-linux-amd64.tar.gz goshell-${VERSION}-linux-amd64

      - uses: actions/upload-artifact@v4
        with:
          name: linux-amd64
          path: dist/*.tar.gz
          retention-days: 1

  # ───────────────────────── macOS ─────────────────────────
  build-macos:
    needs: test
    runs-on: macos-latest
    strategy:
      matrix:
        goarch: [arm64, amd64]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      - name: Build
        env:
          CGO_ENABLED: 1
          GOOS: darwin
          GOARCH: ${{ matrix.goarch }}
        run: |
          go build -trimpath -ldflags="-s -w" -o goshell ./cmd/meatshell

      - name: Package
        run: |
          VERSION="${{ inputs.tag }}"
          VERSION="${VERSION:-${GITHUB_REF_NAME}}"
          ARCH=${{ matrix.goarch }}
          mkdir -p dist/goshell-${VERSION}-macos-${ARCH}
          cp goshell dist/goshell-${VERSION}-macos-${ARCH}/
          cp packaging/darwin/Info.plist dist/goshell-${VERSION}-macos-${ARCH}/ 2>/dev/null || true
          cp assets/icon.png dist/goshell-${VERSION}-macos-${ARCH}/ 2>/dev/null || true
          cp -r lang dist/goshell-${VERSION}-macos-${ARCH}/ 2>/dev/null || true
          cd dist
          zip -r -q goshell-${VERSION}-macos-${ARCH}.zip goshell-${VERSION}-macos-${ARCH}

      - uses: actions/upload-artifact@v4
        with:
          name: macos-${{ matrix.goarch }}
          path: dist/*.zip
          retention-days: 1

  # ───────────────────────── Windows ─────────────────────────
  build-windows:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      - name: Install mingw-w64
        run: |
          sudo apt-get update
          sudo apt-get install -y mingw-w64

      - name: Build
        env:
          CGO_ENABLED: 1
          GOOS: windows
          GOARCH: amd64
          CC: x86_64-w64-mingw32-gcc
          CXX: x86_64-w64-mingw32-g++
        run: |
          go build -trimpath -ldflags="-s -w -H windowsgui" -o goshell.exe ./cmd/meatshell

      - name: Package
        run: |
          VERSION="${{ inputs.tag }}"
          VERSION="${VERSION:-${GITHUB_REF_NAME}}"
          mkdir -p dist/goshell-${VERSION}-windows-x86_64
          cp goshell.exe dist/goshell-${VERSION}-windows-x86_64/
          cp assets/icon.png dist/goshell-${VERSION}-windows-x86_64/ 2>/dev/null || true
          cp -r lang dist/goshell-${VERSION}-windows-x86_64/ 2>/dev/null || true
          cd dist
          zip -r -q goshell-${VERSION}-windows-x86_64.zip goshell-${VERSION}-windows-x86_64

      - uses: actions/upload-artifact@v4
        with:
          name: windows-amd64
          path: dist/*.zip
          retention-days: 1

  # ───────────────────────── Release ─────────────────────────
  release:
    needs: [build-linux, build-macos, build-windows]
    runs-on: ubuntu-latest
    if: always() && !cancelled()
    steps:
      - uses: actions/checkout@v4

      - name: Determine tag
        id: tag
        run: |
          if [ -n "${{ inputs.tag }}" ]; then
            echo "tag=${{ inputs.tag }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT
          fi

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Flatten artifacts
        run: |
          mkdir -p release-assets
          find dist -type f \( -name "*.zip" -o -name "*.tar.gz" \) -exec cp {} release-assets/ \;
          ls -la release-assets/

      - name: Generate checksums
        run: |
          cd release-assets
          sha256sum * > checksums.txt
          cat checksums.txt

      - name: Create or update release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Release $TAG exists, uploading assets with --clobber"
            gh release upload "$TAG" release-assets/* --clobber --repo "$GITHUB_REPOSITORY"
          else
            echo "Creating release $TAG"
            gh release create "$TAG" release-assets/* \
              --title "GoShell $TAG" \
              --notes "GoShell $TAG — cross-platform terminal emulator (SSH/SFTP/Telnet/RLogin/FTP/Mosh/Serial)." \
              --repo "$GITHUB_REPOSITORY"
          fi
